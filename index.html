<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>.:QuantoPesa:.</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/icons/porcentagem.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./assets/icons/porcentagem.png"
    />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <div class="header-actions">
        <h3>Quanto Pesa no bolso?</h3>
        <button id="theme-toggle" type="button">Mudar tema</button>
      </div>

      <section class="cards">
        <div class="card card--empty" id="card-br">
          <div class="card-header">
            <!-- <h4>Valor em Reais (R$)</h4> -->
          </div>
        
          <div class="card-field">
            <span class="input-prefix">R$</span>
            <input
              class="currency-input"
              type="number"
              id="produto-br"
              inputmode="decimal"
              placeholder="0.00"
            />
          </div>
          <div class="card-footer">
            <div class="percent" id="percent-br">--</div>
            <div class="legend">do salário mínimo (BR)</div>
            <div class="progress-bar">
              <div class="progress-fill" id="fill-br"></div>
            </div>
          </div>
        </div>

        <div class="card card--empty" id="card-pt">
          <div class="card-header">
            <!-- <h4>Valor em Euros (€)</h4> -->
          </div>
          <div class="card-field">
            <span class="input-prefix">€</span>
            <input
              class="currency-input"
              type="number"
              id="produto-pt"
              inputmode="decimal"
              placeholder="0.00"
            />
          </div>
          <div class="card-footer">
            <div class="percent" id="percent-pt">--</div>
            <div class="legend">do salário mínimo (PT)</div>
            <div class="progress-bar">
              <div class="progress-fill" id="fill-pt"></div>
            </div>
          </div>
        </div>

        <div class="card card--empty" id="card-usa">
          <div class="card-header">
            <!-- <h4>Valor em Dólares (US$)</h4> -->
          </div>
          <div class="card-field">
            <span class="input-prefix">US$</span>
            <input
              class="currency-input"
              type="number"
              id="produto-usa"
              inputmode="decimal"
              placeholder="0.00"
            />
          </div>
          <div class="card-footer">
            <div class="percent" id="percent-usa">--</div>
            <div class="legend">do salário mínimo (EUA)</div>
            <div class="progress-bar">
              <div class="progress-fill" id="fill-usa"></div>
            </div>
          </div>
        </div>
      </section>

      <div class="salariominimo">
        <h6>Salário mínimo mensal de referência (abr/2026)</h6>

        <div class="salario">
          <img src="https://flagcdn.com/w40/br.png" alt="Brasil" width="22" />
          <span id="salarioMinimo-br"></span>
        </div>

        <div class="salario">
          <img src="https://flagcdn.com/w40/pt.png" alt="Portugal" width="22" />
          <span id="salarioMinimo-pt"></span>
        </div>

        <div class="salario">
          <img src="https://flagcdn.com/w40/us.png" alt="EUA" width="22" />
          <span id="salarioMinimo-usa"></span>
        </div>
      </div>
    </main>

    <footer>
      <p>Developed by <a href="https://github.com/joaoacastro" target="_blank" rel="noopener noreferrer">joaoacastro</a></p>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
